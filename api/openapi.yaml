      description: |
        Creates a new API key.

        The response includes an `authentication_token` that is shown only once (at creation time).
        Copy and store it securely.
      operationId: createApiKey
      parameters:
      - description: Use for knowing which language to use
        examples:
          es:
            summary: for spanish request/response
            value: es
          en:
            summary: for english request/response
            value: en
        explode: false
        in: header
        name: Accept-Language
        required: false
        schema:
