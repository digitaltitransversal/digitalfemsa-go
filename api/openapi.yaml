      - $ref: '#/components/schemas/pagination'
      - properties:
          data:
            items:
              $ref: '#/components/schemas/charges_data_response'
            type: array
        type: object
      description: |
        List preview of charges created for the order.
        Charges are only created when included in the request or created later through payment flows.
        This field can be `null` depending on the response context.
    customer_shipping_contacts_response_address:
      properties:
        object:
          example: shipping_address
          type: string
        street1:
          example: Nuevo Leon 254
          type: string
        street2:
          example: Departamento 404
          type: string
        postal_code:
          example: "06100"
          type: string
        city:
          example: Ciudad de Mexico
          type: string
        state:
          example: Ciudad de Mexico
          type: string
        country:
          example: MX
          type: string
        residential:
          example: true
          nullable: true
          type: boolean
      type: object
    transfers_response_destination:
      description: Destination payout method used to make the transfer.
      properties:
        payee_id:
          description: Unique identifier of the payee.
          example: payee_2icdDewRxDENBos85
          type: string
        id:
          description: Unique identifier of the payout method.
          example: pytmtd_2ide3qwTdDvNBosEC
          type: string
        created_at:
          description: Date and time of creation of the payout method in Unix format.
          example: 1553273553
          format: int64
          type: integer
        object:
          description: "Object name, present for bank transfer destination."
          example: destination
          nullable: true
          type: string
        type:
          description: Destination type.
          example: bank_transfer
          nullable: true
          type: string
        last4:
          description: Last 4 digits of the destination account number.
          example: "6764"
          nullable: true
          type: string
        account_holder_name:
          description: Name of the account holder.
          example: John Doe
          nullable: true
          type: string
        bank:
          description: Name of the bank.
          example: BBVA Bancomer
          nullable: true
          type: string
      required:
      - created_at
      - id
      - payee_id
      type: object
    transfer_destination_response:
      description: Method used to make the transfer.
      properties:
        account_holder:
          description: Name of the account holder.
          example: John Doe
          type: string
        account_number:
          description: Account number of the bank account.
          example: "012180023547896764"
          type: string
        bank:
          description: Name of the bank.
          example: BBVA Bancomer
          type: string
        created_at:
          description: Date and time of creation of the transfer.
          example: 1553273553
          format: int64
          type: integer
        id:
          description: Unique identifier of the transfer.
          example: pytmtd_2ide3qwTdDvNBosEC
          type: string
        object:
          description: "Object name, which is bank_transfer_payout_method."
          example: bank_transfer_payout_method
          type: string
        payee_id:
          description: Unique identifier of the payee.
          example: payee_2icdDewRxDENBos85
          type: string
        type:
          description: Type of the payee.
          example: BankTransferPayoutMethod
          type: string
      title: transfer_destination_response
      type: object
    charge_request_payment_method:
      description: |
        Payment method used in the charge.
      properties:
        type:
          description: Payment method type.
          enum:
          - cash
          - oxxo_cash
          example: cash
          type: string
        expires_at:
          description: "Method expiration date as unix timestamp (applies to some\
            \ payment methods, e.g. cash)."
          example: 1789928542
          format: int64
          nullable: true
          type: integer
        payment_source_id:
          description: Identifier of a saved payment source to be used for this charge
            (if applicable).
          example: src_2tLkkyfMPh6v7pFry
          nullable: true
          type: string
      required:
      - type
      type: object
    customer_payment_sources_inner:
      oneOf:
      - $ref: '#/components/schemas/payment_method_cash_request'
    customer_payment_methods_request:
      oneOf:
      - $ref: '#/components/schemas/payment_method_cash_request'
      title: customer_payment_methods_request
    order_update_fiscal_entity_request:
      description: Fiscal entity information associated with the order.
      properties:
        address:
          $ref: '#/components/schemas/fiscal_entity_address'
        email:
          description: Email of the fiscal entity
          example: test@gmail.com
          type: string
        name:
          description: Name of the fiscal entity
          example: Femsa Inc
          nullable: true
          type: string
        metadata:
          additionalProperties: true
          description: Metadata associated with the fiscal entity
          maxProperties: 100
          type: object
        phone:
          description: Phone of the fiscal entity
          example: "+525511223344"
          type: string
        tax_id:
          description: Tax ID of the fiscal entity
          example: AAA010101AAA
          nullable: true
          type: string
      required:
      - address
      title: order_update_fiscal_entity_request
      type: object
    checkout_order_template:
      description: It maintains the attributes with which the order will be created
        when receiving a new payment.
      properties:
        currency:
          description: It is the currency in which the order will be created. It must
            be a valid ISO 4217 currency code.
          example: MXN
          maxLength: 3
          type: string
        customer_info:
          $ref: '#/components/schemas/customer_info'
        line_items:
          description: They are the products to buy. Each contains the "unit price"
            and "quantity" parameters that are used to calculate the total amount
            of the order.
          items:
            $ref: '#/components/schemas/product'
          type: array
        metadata:
          additionalProperties: true
          description: It is a set of key-value pairs that you can attach to the order.
            It can be used to store additional information about the order in a structured
            format.
          example:
            key: value
          maxProperties: 100
          type: object
      required:
      - currency
      - line_items
      type: object
    update_payment_methods_expires_at:
      oneOf:
      - example: 1677196303
        format: int64
        type: integer
      - example: "1677196303"
        type: string
    update_payment_methods_amount:
      oneOf:
      - example: 10000
        format: int64
        type: integer
      - example: "10000"
        type: string
    customer_shipping_contacts_address:
      description: Address of the person who will receive the order
      properties:
        street1:
          example: Nuevo Leon 254
          type: string
        street2:
          example: Departamento 404
          type: string
        postal_code:
          example: "06100"
          type: string
        city:
          example: Ciudad de Mexico
          type: string
        state:
          example: Ciudad de Mexico
          type: string
        country:
          description: "this field follows the [ISO 3166-1 alpha-2 standard](https://en.wikipedia.org/wiki/ISO_3166-1_alpha-2)"
          example: MX
          type: string
        residential:
          example: true
          nullable: true
          type: boolean
      type: object
    details_error:
      properties:
        code:
          example: femsa.errors.authentication.missing_key
          type: string
        param:
          nullable: true
          type: string
        message:
          example: Acceso no autorizado.
          type: string
        debug_message:
          example: Please include your access key in your request.
          type: string
      title: details_error
      type: object
    discount_lines_data_response:
      allOf:
      - $ref: '#/components/schemas/discount_lines_response'
      title: discount_lines_data_response
    charges_data_response:
      allOf:
      - $ref: '#/components/schemas/charge_response'
      title: charges_data_response
  securitySchemes:
    bearerAuth:
      scheme: bearer
      type: http
