        "401":
          content:
            application/vnd.app-v2.2.0+json:
              example:
                details:
                - message: Please include your access key in your request.
                  param: null
                  code: femsa.errors.authentication.missing_key
                log_id: 507f1f77bcf86cd799439011
                object: error
                type: authentication_error
              schema:
                $ref: '#/components/schemas/error'
          description: authentication error
        "422":
          content:
            application/vnd.app-v2.2.0+json:
              example:
                details:
                - message: The name does not exist.
                  param: payment_method.name
                  code: femsa.errors.parameter_validation.payment_method.name.nonexistent_token
                  debug_message: The name does not exist.
                log_id: 641b6d813cd9a50001515017
                object: error
                type: parameter_validation_error
              schema:
                $ref: '#/components/schemas/error'
          description: parameter validation error
        "500":
