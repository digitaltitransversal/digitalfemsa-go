    transaction_response:
      description: Transaction object.
      properties:
        id:
          description: Unique identifier of the transaction.
          example: 5ee7ec5b8dea41085erb7f9e
          type: string
        object:
          description: "Object name, which is transaction."
          example: transaction
          type: string
        amount:
          description: The amount of the transaction.
          example: 1000
          format: int64
          type: integer
        fee:
          description: The amount to be deducted for taxes and commissions.
          example: 560
          format: int64
          type: integer
        net:
          description: The net amount after deducting commissions and taxes.
          example: 440
          format: int64
          type: integer
        currency:
          description: The currency of the transaction. It uses the 3-letter code
            of ISO 4217.
          example: MXN
          maxLength: 3
          type: string
        status:
          description: Code indicating transaction status.
          enum:
          - unprocessed
          - pending
          - available
          - owing
          - paid_out
          - on_hold
          - retained
          - voided
          example: pending
          type: string
        type:
          description: Transaction type.
          enum:
          - capture
          - capture_reversal
          - liquidation
          - liquidation_reversal
          - payout
          - payout_reversal
          - refund
          - refund_reversal
          - rounding_adjustment
          - transfer
          - transferred
          - retention
          - temporary_retention
          - cashout_retention
          - cashout_confirmation
          - cashout_cancelation
          - autofund_capture
          example: capture
          type: string
        created_at:
          description: Date and time of creation of the transaction in Unix format.
          example: 1553273553
          format: int64
          type: integer
        livemode:
          description: Indicates whether the transaction was created in live mode
            or test mode.
          example: true
          type: boolean
        charge:
          description: Charge ID associated with the transaction (present only if
            the transaction belongs to a charge).
          example: 5ee7ec58885a45585e6d9f8m
          nullable: true
          type: string
        transfer:
          description: Transfer ID associated with the transaction (present only if
            the transaction belongs to a transfer).
          example: trf_2tPAmKCEJqh8RE6nY
          nullable: true
          type: string
        transferred_at:
          description: "Date and time when the transaction was transferred, in Unix\
            \ format."
          example: 1553273999
          format: int64
          nullable: true
          type: integer
        formula:
          description: Transaction fee formula identifier (if available).
          nullable: true
          type: string
      required:
      - amount
      - created_at
      - currency
      - fee
      - id
      - livemode
      - net
      - object
      - status
      - type
      title: transaction_response
      type: object
